query CartInput {
  cart {
    buyerIdentity {
      customer {
        id
      }
    }
    lines {
      id
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            metafield(namespace: "custom", key: "discount") {
              value
            }
          }
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "$app:memexclu-discount", key: "function-configuration") {
      value
    }
  }
}